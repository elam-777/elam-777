<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fortnite Training Hub</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to right, #0f172a, #020617);
  color:white;
}

header {
  text-align:center;
  padding:30px;
  background:#020617;
}

h1 { font-size:40px; }

section {
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  margin:15px 0;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

iframe {
  width:100%;
  height:250px;
  border-radius:10px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}
button:hover {
  background:#0ea5e9;
}
</style>

<script>
function copyCode(code) {
  navigator.clipboard.writeText(code);
  alert("Copied: " + code);
}
</script>

</head>

<body>

<header>
  <h1>🎮 Fortnite Training Hub</h1>
  <p>Build insane aim, mechanics, and level up FAST</p>
</header>

<section>
  <h2>📍 Best Landing Spots</h2>
  <div class="card">
    <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
    <p>Learn where to land for max loot and wins.</p>
  </div>
</section>

<section>
  <h2>⚡ XP Maps</h2>
  <div class="card">
    <p>Map Code: 1234-1111-2222</p>
    <button onclick="copyCode('1234-1111-2222')">Copy Code</button>
    <p>⏱ Play 15–20 min for best XP</p>
  </div>
</section>

<section>
  <h2>🏗 Free Build Maps</h2>
  <div class="card">
    <p>Map Code: 5678-3333-4444</p>
    <button onclick="copyCode('5678-3333-4444')">Copy Code</button>
    <p>⏱ 20–30 min daily</p>
  </div>
</section>

<section>
  <h2>🎯 Aim Training</h2>
  <div class="card">
    <p>Map Code: 9999-8888-7777</p>
    <button onclick="copyCode('9999-8888-7777')">Copy Code</button>
    <p>⏱ 15 min = faster reaction time</p>
  </div>
</section>

<section>
  <h2>🏃 Obby / Parkour Maps</h2>
  <div class="card">
    <p>Improve movement, edits, and reflex speed.</p>
  </div>
</section>

<section>
  <h2>🏆 Mini Tournaments</h2>
  <div class="card">
    <p>1v1 friends or join creative matchmaking maps.</p>
  </div>
</section>

<section>
  <h2>⏱ Daily Training Plan</h2>
  <div class="card">
    <p>🎯 Aim → 15 min</p>
    <p>🏗 Free Build → 20 min</p>
    <p>⚔️ Matches → 30–45 min</p>
    <p>⚡ XP Maps → 15 min</p>
  </div>
</section>

</body>
</html>
